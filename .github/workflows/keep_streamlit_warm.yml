name: Keep Streamlit warm

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit app
        run: |
          curl \
            --fail \
            --silent \
            --show-error \
            --max-time 45 \
            --retry 3 \
            --retry-delay 10 \
            "https://miketibson-analytics.streamlit.app/healthz" \
            > /dev/null
